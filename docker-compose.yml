services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      # Ollama is expected to run on the host machine, not in a container,
      # since pulling model weights inside Docker on every rebuild is slow.
      # `host.docker.internal` lets the container reach it.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.2
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
